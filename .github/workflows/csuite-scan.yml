name: C-Suite Intelligence Brief

on:
  schedule:
    - cron: '30 2 * * 1'   # Every Monday 08:00 IST (02:30 UTC)
  workflow_dispatch:        # Manual trigger for testing

jobs:
  run-brief:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install anthropic pytz

      - name: Run intelligence brief
        env:
          ANTHROPIC_API_KEY:  ${{ secrets.ANTHROPIC_API_KEY }}
          AGENT_ID:           ${{ secrets.AGENT_ID }}
          ENVIRONMENT_ID:     ${{ secrets.ENVIRONMENT_ID }}
          MEMORY_STORE_ID:    ${{ secrets.MEMORY_STORE_ID }}
          VAULT_ID:           ${{ secrets.VAULT_ID }}
        run: python scripts/run_brief.py
